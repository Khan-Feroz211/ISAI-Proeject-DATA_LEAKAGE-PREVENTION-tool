version: "3.9"

services:
  # ── DLP App ──────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shieldai-dlp:latest
    container_name: shieldai-dlp
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/dlp.db}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DLP_SMTP_SERVER=${DLP_SMTP_SERVER:-}
      - DLP_SMTP_PASSWORD=${DLP_SMTP_PASSWORD:-}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
    volumes:
      - dlp-data:/app/data
      - dlp-reports:/app/reports
      - dlp-models:/app/mlops
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  dlp-data:
  dlp-reports:
  dlp-models:
