<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ShieldAI DLP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{500:'#6366f1',600:'#4f46e5',700:'#4338ca'}}}}}</script>
  <style>body{font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="h-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex w-16 h-16 rounded-2xl bg-brand-500 items-center justify-center shadow-xl mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-9 h-9 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white">ShieldAI DLP</h1>
      <p class="text-slate-400 text-sm mt-1">Enterprise Data Leakage Prevention</p>
    </div>

    <!-- Card -->
    <div class="bg-white/5 backdrop-blur border border-white/10 rounded-2xl p-8 shadow-2xl">
      <h2 class="text-lg font-semibold text-white mb-6">Sign in to your account</h2>

      {% if error %}
      <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Username</label>
          <input type="text" name="username" required autocomplete="username"
                 class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white
                        placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent text-sm"
                 placeholder="admin" />
        </div>
        <div>
          <label class="block text-slate-300 text-sm font-medium mb-1.5">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full px-4 py-2.5 bg-white/10 border border-white/20 rounded-lg text-white
                        placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent text-sm"
                 placeholder="••••••••" />
        </div>
        <div class="flex items-center">
          <input id="remember" name="remember" type="checkbox" value="on"
                 class="w-4 h-4 rounded border-white/20 bg-white/10 text-brand-500">
          <label for="remember" class="ml-2 text-sm text-slate-400">Remember me</label>
        </div>
        <button type="submit"
                class="w-full py-2.5 px-4 bg-brand-500 hover:bg-brand-600 active:bg-brand-700
                       text-white font-semibold rounded-lg transition-colors shadow-lg text-sm mt-2">
          Sign In
        </button>
      </form>

      <p class="mt-6 text-center text-xs text-slate-500">
        Default credentials: <code class="text-slate-400">admin / admin</code>
        — change on first login.
      </p>
    </div>
  </div>
</body>
</html>
