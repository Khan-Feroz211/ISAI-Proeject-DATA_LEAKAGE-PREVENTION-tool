{% extends "base.html" %}
{% block title %}Monitor{% endblock %}
{% block breadcrumb %}Monitor{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">

  <!-- Config -->
  <div class="lg:col-span-1 space-y-4">
    <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-8 h-8 rounded-lg bg-green-50 flex items-center justify-center">
          <i data-lucide="activity" class="w-4 h-4 text-green-600"></i>
        </div>
        <h2 class="text-sm font-semibold text-slate-700">Real-Time Monitor</h2>
      </div>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1.5">Watch Directory</label>
          <input id="watch-path" type="text" value="/home"
                 class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500"
                 placeholder="/path/to/watch" />
        </div>
        <button id="start-btn" onclick="startMonitor()"
                class="w-full py-2.5 bg-green-500 hover:bg-green-600 text-white text-sm font-semibold rounded-lg transition-colors">
          ▶ Start Monitoring
        </button>
        <button id="stop-btn" onclick="stopMonitor()" disabled
                class="w-full py-2.5 bg-slate-200 text-slate-400 text-sm font-semibold rounded-lg cursor-not-allowed transition-colors">
          ■ Stop Monitoring
        </button>
      </div>
    </div>

    <!-- Status -->
    <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
      <h3 class="text-sm font-semibold text-slate-700 mb-3">Monitor Status</h3>
      <div class="space-y-2">
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Status</span>
          <span id="monitor-status" class="font-medium text-slate-400">Idle</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Events detected</span>
          <span id="event-count" class="font-medium text-slate-700">0</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-slate-500">Watching</span>
          <span id="watching-path" class="font-medium text-slate-700 truncate max-w-32">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Event log -->
  <div class="lg:col-span-2">
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm h-full flex flex-col">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
        <h3 class="text-sm font-semibold text-slate-700">Live Event Stream</h3>
        <button onclick="clearLog()"
                class="text-xs text-slate-400 hover:text-slate-600 font-medium">Clear</button>
      </div>
      <div id="event-log" class="flex-1 overflow-y-auto p-4 space-y-1 font-mono text-xs max-h-[560px] bg-slate-950 rounded-b-xl">
        <p class="text-slate-500"># Waiting for events…</p>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
let isMonitoring = false;
let eventCount = 0;
let mockInterval = null;

function startMonitor() {
  const path = document.getElementById('watch-path').value.trim();
  if (!path) { toast('Enter a directory path', 'warning'); return; }

  fetch('/api/monitor/start', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ path }),
  }).then(r => r.json()).then(d => {
    if (d.success) {
      isMonitoring = true;
      document.getElementById('monitor-status').textContent = 'Monitoring';
      document.getElementById('monitor-status').className = 'font-medium text-green-600';
      document.getElementById('watching-path').textContent = path;
      document.getElementById('start-btn').disabled = true;
      document.getElementById('start-btn').className = 'w-full py-2.5 bg-slate-200 text-slate-400 text-sm font-semibold rounded-lg cursor-not-allowed';
      document.getElementById('stop-btn').disabled = false;
      document.getElementById('stop-btn').className = 'w-full py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-semibold rounded-lg transition-colors';
      logEvent('system', `Started monitoring: ${path}`);
      toast('Monitoring started', 'success');
      startMockEvents();
    }
  }).catch(() => toast('Failed to start monitor', 'error'));
}

function stopMonitor() {
  isMonitoring = false;
  clearInterval(mockInterval);
  document.getElementById('monitor-status').textContent = 'Idle';
  document.getElementById('monitor-status').className = 'font-medium text-slate-400';
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').className = 'w-full py-2.5 bg-green-500 hover:bg-green-600 text-white text-sm font-semibold rounded-lg transition-colors';
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('stop-btn').className = 'w-full py-2.5 bg-slate-200 text-slate-400 text-sm font-semibold rounded-lg cursor-not-allowed';
  logEvent('system', 'Monitoring stopped');
  toast('Monitoring stopped', 'info');
}

function logEvent(type, message) {
  const log = document.getElementById('event-log');
  const ts  = new Date().toISOString();
  const COLOR = { system:'text-slate-400', write:'text-yellow-400', read:'text-blue-400',
                  create:'text-green-400', delete:'text-red-400', alert:'text-red-500 font-bold' };
  const el = document.createElement('p');
  el.className = COLOR[type] || 'text-slate-300';
  el.textContent = `[${ts}] [${type.toUpperCase().padEnd(6)}] ${message}`;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
  eventCount++;
  document.getElementById('event-count').textContent = eventCount;
}

function clearLog() {
  document.getElementById('event-log').innerHTML = '<p class="text-slate-500"># Log cleared</p>';
  eventCount = 0;
  document.getElementById('event-count').textContent = 0;
}

const MOCK = [
  ['read',   'Process read file: /home/user/documents/report.docx'],
  ['write',  'File modified: /tmp/config.yaml'],
  ['create', 'New file created: /home/user/downloads/invoice.pdf'],
  ['read',   'Process read file: /etc/hosts'],
  ['alert',  'SENSITIVE DATA: credit_card pattern detected in /home/user/data.csv'],
  ['write',  'File modified: /home/user/.bashrc'],
  ['delete', 'File deleted: /tmp/temp_file.txt'],
];
let mockIdx = 0;
function startMockEvents() {
  mockInterval = setInterval(() => {
    if (!isMonitoring) return;
    const [type, msg] = MOCK[mockIdx % MOCK.length];
    logEvent(type, msg);
    mockIdx++;
  }, 2200);
}
</script>
{% endblock %}
