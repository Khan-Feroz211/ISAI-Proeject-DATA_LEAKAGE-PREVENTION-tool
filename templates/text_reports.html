{% extends "base.html" %}
{% block title %}Text Reports{% endblock %}
{% block breadcrumb %}Text Reports{% endblock %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
  <div class="lg:col-span-1">
    <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
      <h3 class="text-sm font-semibold text-slate-700 mb-4">Generate Text Report</h3>
      <div class="space-y-3">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1.5">Report Type</label>
          <select id="report-type"
                  class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500">
            <option value="summary">Summary Report</option>
            <option value="detailed">Detailed Report</option>
          </select>
        </div>
        <button onclick="previewReport()"
                class="w-full py-2.5 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-lg transition-colors">
          Preview Report
        </button>
        <button onclick="downloadReport()"
                class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold rounded-lg transition-colors">
          ↓ Download .txt
        </button>
      </div>
    </div>
  </div>
  <div class="lg:col-span-2">
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
        <h3 class="text-sm font-semibold text-slate-700">Report Preview</h3>
        <span id="report-ts" class="text-xs text-slate-400"></span>
      </div>
      <pre id="report-preview" class="p-5 text-xs font-mono text-slate-600 overflow-auto max-h-[600px] bg-slate-950 text-green-400 rounded-b-xl whitespace-pre-wrap">
# Click "Preview Report" to generate a text report</pre>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function previewReport() {
  const type = document.getElementById('report-type').value;
  const r = await fetch('/api/report/text', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type }),
  });
  const d = await r.json();
  if (d.success) {
    document.getElementById('report-preview').textContent = d.report || '(empty)';
    document.getElementById('report-ts').textContent = new Date(d.timestamp).toLocaleString();
  } else {
    toast('Error generating report', 'error');
  }
}

async function downloadReport() {
  const type = document.getElementById('report-type').value;
  const r = await fetch('/api/report/text/download', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type }),
  });
  const blob = await r.blob();
  const cd   = r.headers.get('Content-Disposition') || '';
  const m    = cd.match(/filename="([^"]+)"/);
  const fname= m ? m[1] : 'dlp_report.txt';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  toast('Report downloaded', 'success');
}
</script>
{% endblock %}
