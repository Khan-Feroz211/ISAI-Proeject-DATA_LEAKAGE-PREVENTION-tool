{% extends "base.html" %}
{% block title %}Reports{% endblock %}
{% block breadcrumb %}Reports{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-5">
  <div>
    <h2 class="text-lg font-semibold text-slate-800">Security Reports</h2>
    <p class="text-sm text-slate-500 mt-0.5">Generate and download DLP scan reports</p>
  </div>
  <button onclick="generateReport()"
          class="flex items-center gap-2 px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-lg transition-colors">
    <i data-lucide="file-plus" class="w-4 h-4"></i> Generate Report
  </button>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
  <table class="w-full text-sm">
    <thead class="bg-slate-50 border-b border-slate-200">
      <tr>
        <th class="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Report Name</th>
        <th class="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Type</th>
        <th class="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Format</th>
        <th class="text-left px-5 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Created</th>
        <th class="px-5 py-3"></th>
      </tr>
    </thead>
    <tbody id="reports-tbody">
      <tr><td colspan="5" class="text-center py-10 text-slate-400">Loading…</td></tr>
    </tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadReports() {
  const r = await fetch('/api/reports');
  const d = await r.json();
  const tbody = document.getElementById('reports-tbody');
  const reports = d.reports || [];
  if (!reports.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">No reports yet — generate one above</td></tr>';
    return;
  }
  tbody.innerHTML = reports.map(rep => `
    <tr class="border-t border-slate-100 hover:bg-slate-50 transition-colors">
      <td class="px-5 py-3 font-medium text-slate-800">${rep.name}</td>
      <td class="px-5 py-3 capitalize text-slate-600">${rep.report_type}</td>
      <td class="px-5 py-3 uppercase text-slate-400 text-xs font-mono">${rep.format}</td>
      <td class="px-5 py-3 text-slate-400 text-xs">${rep.created_at ? new Date(rep.created_at).toLocaleString() : '—'}</td>
      <td class="px-5 py-3 text-right">
        <button onclick="downloadReportById(${rep.id})"
                class="text-xs px-3 py-1.5 rounded-lg bg-brand-50 hover:bg-brand-100 text-brand-600 font-medium transition-colors">
          ↓ Download
        </button>
      </td>
    </tr>`).join('');
}

async function generateReport() {
  const r = await fetch('/api/report/generate', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type:'summary' }),
  });
  const d = await r.json();
  if (d.success) {
    toast('Report generated', 'success');
    loadReports();
  } else {
    toast('Error generating report', 'error');
  }
}

async function downloadReportById(id) {
  const r = await fetch('/api/report/text/download', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type:'summary' }),
  });
  const blob = await r.blob();
  const cd   = r.headers.get('Content-Disposition') || '';
  const m    = cd.match(/filename="([^"]+)"/);
  const fname= m ? m[1] : `report_${id}.txt`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  toast('Report downloaded', 'success');
}

loadReports();
</script>
{% endblock %}
